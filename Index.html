<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Minha Loja Premium</title>

  <!-- Fonte moderna -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- MENU -->
<header>
  <div class="logo">MINHA LOJA</div>
  <div class="menu-btn" id="menuBtn">☰</div>
</header>

<!-- MENU OVERLAY -->
<div class="menu-overlay" id="menu">
  <a href="#">Home</a>
  <a href="#">Produtos</a>
  <a href="#">Sobre</a>
  <a href="#">Contato</a>
</div>

<!-- HERO -->
<section class="hero">
  <h1 class="fade-up">Design que vende</h1>
  <p class="fade-up delay">Sua loja com aparência premium</p>
</section>

<!-- PRODUTOS -->
<section class="produtos">

  <div class="card fade-up">
    <img src="https://via.placeholder.com/300">
    <h3>Produto 1</h3>
    <p>R$ 99</p>
  </div>

  <div class="card fade-up delay">
    <img src="https://via.placeholder.com/300">
    <h3>Produto 2</h3>
    <p>R$ 149</p>
  </div>

  <div class="card fade-up delay2">
    <img src="https://via.placeholder.com/300">
    <h3>Produto 3</h3>
    <p>R$ 199</p>
  </div>

</section>

<script src="script.js"></script>
</body>
</html>
