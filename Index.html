<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Minha Loja Premium</title>

  <!-- Fonte moderna -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOGO -->
<header>
  <div class="logo">CALLBLACK</div>
</header>

<!-- BOTÃO MENU -->
<button class="menu-btn" id="menuBtn">
  <span></span>
  <span></span>
  <span></span>
</button>

<!-- MENU OVERLAY -->
<div class="menu-overlay" id="menu">
  <a href="#">Home</a>
  <a href="#">Produtos</a>
  <a href="#">Sobre</a>
  <a href="#">Contato</a>
</div>

<!-- VIDEO HERO -->
<section class="video-hero">
  <video id="heroVideo" 
         src="imagens/video-hero.mp4" 
         autoplay muted 
         poster="imagens/frame-inicial.jpg"
         playsinline>
  </video>
  <img id="heroImage" 
       src="imagens/frame-final.jpg" 
       alt="Ícone final" 
       class="hero-image">
  <div class="hero-content">
    <h1 class="fade-up">Design que vende</h1>
    <p class="fade-up delay">Sua loja com aparência premium</p>
  </div>
</section>

<!-- PRODUTOS -->
<section class="produtos">

  <div class="card fade-up">
    <img src="https://via.placeholder.com/300">
    <h3>Produto 1</h3>
    <p>R$ 99</p>
  </div>

  <div class="card fade-up delay">
    <img src="https://via.placeholder.com/300">
    <h3>Produto 2</h3>
    <p>R$ 149</p>
  </div>

  <div class="card fade-up delay2">
    <img src="https://via.placeholder.com/300">
    <h3>Produto 3</h3>
    <p>R$ 199</p>
  </div>

</section>

<script src="script.js"></script>
</body>
</html>
